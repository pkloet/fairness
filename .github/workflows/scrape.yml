# .github/workflows/scrape.yml
#
# Three jobs:
#
#   update-schedule   — runs every Monday at 03:00 UTC.
#                       Scrapes time-team.nl/en/info/regattas and saves
#                       data/schedule.json with upcoming race dates.
#
#   scrape-live       — runs every 15 minutes, always.
#                       Reads schedule.json first — if today is NOT a race
#                       day it exits in ~5 seconds (costs almost no Action
#                       minutes). If today IS a race day it runs the full
#                       scraper for the current year only.
#
#   scrape-history    — runs every Monday at 04:00 UTC (after update-schedule).
#                       Scrapes all regattas from 2010 to today, skipping
#                       years whose JSON files already exist.
#
# All jobs can also be triggered manually from the Actions tab.

name: Scrape regatta data

on:
  schedule:
    - cron: "0 3 * * 1"      # Monday 03:00 UTC — update schedule
    - cron: "0 4 * * 1"      # Monday 04:00 UTC — history backfill
    - cron: "*/15 * * * *"   # Every 15 minutes — live scrape

  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: true
        default: "live"
        type: choice
        options:
          - schedule
          - live
          - history
          - analyse
      regatta:
        description: "Regatta code (leave empty for all)"
        required: false
        default: ""
      year:
        description: "Year (leave empty for default)"
        required: false
        default: ""
      force:
        description: "Force re-scrape even if files exist"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force_race_day:
        description: "Treat today as a race day (skip schedule check)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:

  # ── 1. Update schedule ────────────────────────────────────────────────────
  update-schedule:
    name: Update race calendar
    runs-on: ubuntu-latest

    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 1') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'schedule')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Parse regatta calendar
        run: python parse_schedule.py

      - name: Commit schedule
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schedule.json
          if git diff --cached --quiet; then
            echo "Schedule unchanged."
          else
            git commit -m "schedule: update race calendar [$(date -u '+%Y-%m-%d')]"
            git pull --rebase && git push
          fi

  # ── 2. Live scrape (every 15 min, smart exit if no race) ─────────────────
  scrape-live:
    name: Live scrape
    runs-on: ubuntu-latest

    if: |
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'live')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check if today is a race day
        id: check
        run: |
          if [ "${{ github.event.inputs.force_race_day }}" = "true" ]; then
            echo "race_day=true" >> $GITHUB_OUTPUT
            echo "Forced race day."
            exit 0
          fi

          python - <<'EOF'
          import sys, os
          sys.path.insert(0, '.')
          from parse_schedule import is_race_day
          if is_race_day():
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('race_day=true\n')
              print("Today IS a race day — will scrape.")
          else:
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('race_day=false\n')
              print("No race today — exiting early.")
          EOF

      - name: Run scraper (race days only)
        if: steps.check.outputs.race_day == 'true'
        run: |
          # If manually triggered with a specific regatta/year, use those
          if [ -n "${{ github.event.inputs.regatta }}" ]; then
            YEAR="${{ github.event.inputs.year }}"
            YEAR="${YEAR:-$(date +%Y)}"
            python scrape.py --regatta ${{ github.event.inputs.regatta }} --year $YEAR --force
          else
            # Automatic: only scrape the regatta(s) racing today
            REGATTAS=$(python today_regatta.py)
            if [ -z "$REGATTAS" ]; then
              echo "No regatta found for today, skipping."
              exit 0
            fi
            for REGATTA in $REGATTAS; do
              echo "Scraping live regatta: $REGATTA"
              python scrape.py --regatta $REGATTA --year $(date +%Y) --force
            done
          fi

      - name: Commit new data
        if: steps.check.outputs.race_day == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data."
          else
            git commit -m "data: live update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git pull --rebase && git push
          fi

  # ── 3. Weekly history backfill ────────────────────────────────────────────
  scrape-history:
    name: Full history backfill
    runs-on: ubuntu-latest

    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'history')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run historical scraper
        run: |
          CMD="python scrape.py"

          if [ -n "${{ github.event.inputs.regatta }}" ]; then
            CMD="$CMD --regatta ${{ github.event.inputs.regatta }}"
          fi

          if [ -n "${{ github.event.inputs.year }}" ]; then
            CMD="python scrape.py --year ${{ github.event.inputs.year }}"
            if [ -n "${{ github.event.inputs.regatta }}" ]; then
              CMD="$CMD --regatta ${{ github.event.inputs.regatta }}"
            fi
          fi

          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            CMD="$CMD --force"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Commit new data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data."
          else
            git commit -m "data: historical backfill [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git pull --rebase && git push
          fi

  # ── 3. Weekly history backfill ────────────────────────────────────────────
  analyse-only:
      name: Run analysis only (no scraping)
      runs-on: ubuntu-latest
  
      if: |
        github.event_name == 'workflow_dispatch' &&
        github.event.inputs.job == 'analyse'
  
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.12"
            cache: pip
        - name: Install dependencies
          run: pip install -r requirements.txt
        - name: Run analysis
          run: |
            CMD="python analyse.py"
            if [ -n "${{ github.event.inputs.regatta }}" ]; then
              CMD="$CMD --regatta ${{ github.event.inputs.regatta }}"
            fi
            if [ -n "${{ github.event.inputs.year }}" ]; then
              CMD="$CMD --year ${{ github.event.inputs.year }}"
            fi
            echo "Running: $CMD"
            $CMD
        - name: Commit results
          run: |
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            if git diff --cached --quiet; then
              echo "No new results."
            else
              git commit -m "analysis: compute lane fairness models [$(date -u '+%Y-%m-%d')]"
              git pull --rebase && git push
            fi
